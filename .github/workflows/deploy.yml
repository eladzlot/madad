name: Deploy redirect

# ── Redirect shim for the old GitHub Pages URL (docs/CLOUDFLARE_MIGRATION.md,
#    Stage 8) ─────────────────────────────────────────────────────────────────
# Madad moved to Cloudflare (app.ezmadad.com + ezmadad.com). This workflow no
# longer builds or deploys the app — it publishes the tiny redirect artifact in
# pages-redirect/ so old eladzlot.github.io/madad/… links forward to the new
# domains (path + query preserved client-side). The Cloudflare deploy lives in
# deploy-cloudflare.yml. Stage 9 removes this workflow and disables Pages once
# the redirect grace period ends.
#
# Rollback (restore the old app at /madad/): revert this commit — the previous
# revision built dist/ at base /madad/ and deployed it here.
on:
  push:
    branches: [main]
    paths:
      - 'pages-redirect/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-redirect:
    name: Publish redirect to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload redirect artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-redirect/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
